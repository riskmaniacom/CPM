function ct(tid,sid){let d=0,ind=0;LNK.forEach(l=>{if(l.f===sid&&l.t===tid)d+=l.dep*(l.sb/5);if(l.t===sid&&l.f===tid)d+=l.dep*.4*(l.sb/5);});LNK.filter(l=>l.f===sid).forEach(l1=>{LNK.filter(l2=>l2.f===l1.t&&l2.t===tid).forEach(l2=>{ind+=(l1.dep*l2.dep/100)*.35*(l2.sb/5);});});return Math.min(100,d+ind);}

/* 1~3차 하청 트리 렌더 */
function subTree(parId){
  const t1=SUB.filter(s=>s.par===parId&&s.tier===1);
  if(!t1.length)return`<div style="font-size:11px;color:#9ca3af;padding:8px;">해당 없음</div>`;
  const all=SUB.filter(s=>s.par===parId);
  const t2=all.filter(s=>s.tier===2),t3=all.filter(s=>s.tier===3);
  const totExp=all.reduce((a,s)=>a+s.bx,0),hiR=all.filter(s=>srisk(s)>=45).length;
  let html=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
    ${[{lb:"1차 하청",v:`${t1.length}개사`,c:"#0d9488"},{lb:"2차 하청",v:`${t2.length}개사`,c:"#7c3aed"},{lb:"3차 하청",v:`${t3.length}개사`,c:"#0ea5e9"},{lb:"총 익스포져",v:fmt(totExp),c:"#374151"},{lb:"고위험",v:`${hiR}개사`,c:hiR>0?"#dc2626":"#15803d",w:hiR>0}].map(k=>`<div style="flex:1;min-width:80px;padding:7px 10px;border-radius:7px;background:${k.w?"#fef2f2":"#f7f8fb"};border:1px solid ${k.w?"#fecaca":"#e3e7ef"};"><div style="font-size:8px;color:#9ca3af;margin-bottom:2px;">${k.lb}</div><div style="font-size:14px;font-weight:800;color:${k.c};font-family:monospace;">${k.v}</div></div>`).join("")}
  </div>`;
  t1.forEach(s1=>{
    html+=subCard(s1,0);
    const ch2=SUB.filter(s=>s.psub===s1.id&&s.tier===2);
    ch2.forEach(s2=>{

    });
  });
  return html;
}

const ACT={FREEZE:{cd:"FREEZE",lb:"한도 동결",c:"#b45309",ic:"⏸",pr:2},REDUCE_S:{cd:"REDUCE_S",lb:"소폭 축소",c:"#ea580c",ic:"↓",pr:3},REDUCE_L:{cd:"REDUCE_L",lb:"대폭 축소",c:"#dc2626",ic:"↓↓",pr:4},SUSPEND:{cd:"SUSPEND",lb:"신규 중단",c:"#991b1b",ic:"✕",pr:5},MAINTAIN:{cd:"MAINTAIN",lb:"현행 유지",c:"#15803d",ic:"→",pr:1},INCREASE:{cd:"INCREASE",lb:"한도 증액",c:"#1d6fdb",ic:"↑",pr:0}};
function genRecs(){return CO.map(c=>{const sc=dscore(c),lv=dlv(sc),e=ead(c),ur=e/c.lim,ms=SUB.filter(s=>s.par===c.id&&s.tier===1),hs=ms.filter(s=>srisk(s)>=45),ac=CO.filter(x=>x.id!==c.id).reduce((s,x)=>s+ct(x.id,c.id),0)/(CO.length-1);let act,ar,tl,rat=[],cond=[];if(sc>=80||(sc>=70&&ur>.95)){act=ACT.SUSPEND;ar=-100;tl="즉시 (1개월 내)";rat.push(`부실점수 ${sc}/100`);if(c.icr<1.5)rat.push(`ICR ${c.icr}배`);if(c.npl>=3)rat.push(`연체율 ${c.npl}%`);cond.push("잔액 만기 시 회수");cond.push("담보·보증 즉시 점검");}else if(sc>=60){act=ACT.REDUCE_L;ar=-30;tl="즉시 (1개월 내)";rat.push(`부실점수 ${sc}/100`);if(c.lev>=.80)rat.push(`레버리지 ${c.lev.toFixed(2)}`);cond.push("분기별 재무제표 징구");}else if(sc>=45){act=ACT.REDUCE_S;ar=-15;tl="단기 (3개월 내)";rat.push(`부실점수 ${sc}/100`);if(ac>20)rat.push(`전이충격 ${ac.toFixed(0)}%`);cond.push("월별 모니터링 강화");}else if(sc>=30||ac>15||hs.length>=2){act=ACT.FREEZE;ar=0;tl="단기 (3개월 내)";rat.push(`부실점수 ${sc}/100`);if(hs.length>=2)rat.push(`1차하청 고위험 ${hs.length}개사`);cond.push("신규 취급 시 리스크위원회 승인");}else if(sc<20&&ur<.7&&c.icr>8){act=ACT.INCREASE;ar=15;tl="중기 (6개월 내)";rat.push(`부실점수 ${sc}/100 우량`);cond.push("영업확대 활용");}else{act=ACT.MAINTAIN;ar=0;tl="모니터링 지속";rat.push("안정적");}const nl=Math.round(c.lim*(1+ar/100));return{id:c.id,nm:c.nm,g:c.g,i:c.i,cl:c.lim,nl,dl:nl-c.lim,ar,e,ur,sc,ac,hsc:hs.length,act,tl,rat,cond,lv,icr:c.icr,dsr:c.dsr,lev:c.lev,npl:c.npl,apv:c.apv,bal:c.bal};});}
function genGR(cr){const gm={};CO.forEach(c=>{if(!gm[c.g])gm[c.g]={tl:0,te:0,sc:[],recs:[]};gm[c.g].tl+=c.lim;gm[c.g].te+=ead(c);gm[c.g].sc.push(dscore(c));gm[c.g].recs.push(cr.find(r=>r.id===c.id));});return Object.entries(gm).map(([gid,d])=>{const msc=Math.max(...d.sc),asc=d.sc.reduce((a,b)=>a+b,0)/d.sc.length,rc=d.recs.filter(r=>r&&r.act.pr>=3).length,susp=d.recs.filter(r=>r&&r.act.cd==="SUSPEND").length,ur=d.te/d.tl,g=GRP[gid];let act,ar,tl,rat=[],cond=[];if(susp>=2||msc>=80){act=ACT.SUSPEND;ar=-100;tl="즉시 (1개월 내)";rat.push(`경계기업 ${susp}개사`);cond.push("CCOG 통합한도 관리");}else if(rc>=2||msc>=65){act=ACT.REDUCE_L;ar=-20;tl="즉시 (1개월 내)";rat.push(`축소기업 ${rc}개사`);cond.push("계열 공동 모니터링");}else if(rc>=1||asc>=35){act=ACT.REDUCE_S;ar=-10;tl="단기 (3개월 내)";rat.push(`평균부실 ${asc.toFixed(0)}`);cond.push("상호보증 확인");}else if(ur>.90){act=ACT.FREEZE;ar=0;tl="단기 (3개월 내)";rat.push(`EAD/한도 ${(ur*100).toFixed(1)}%`);}else if(asc<20&&ur<.70){act=ACT.INCREASE;ar=10;tl="중기 (6개월 내)";rat.push(`평균부실 ${asc.toFixed(0)} 안정`);}else{act=ACT.MAINTAIN;ar=0;tl="모니터링 지속";rat.push("허용범위 내");}const nl=Math.round(d.tl*(1+ar/100));return{id:gid,nm:g.n,cl:d.tl,nl,dl:nl-d.tl,ar,e:d.te,ur,msc,asc:Math.round(asc),act,tl,rat,cond,cnt:d.sc.length};});}
function genIR(cr){const im={};CO.forEach(c=>{if(!im[c.i])im[c.i]={tl:0,te:0,sc:[],recs:[]};im[c.i].tl+=c.lim;im[c.i].te+=ead(c);im[c.i].sc.push(dscore(c));im[c.i].recs.push(cr.find(r=>r.id===c.id));});return Object.entries(im).map(([iid,d])=>{const msc=Math.max(...d.sc),asc=d.sc.reduce((a,b)=>a+b,0)/d.sc.length,rc=d.recs.filter(r=>r&&r.act.pr>=3).length,ur=d.te/d.tl,ind=IND[iid];let act,ar,tl,rat=[],cond=[];if(msc>=75&&rc>=2){act=ACT.REDUCE_L;ar=-25;tl="즉시 (1개월 내)";rat.push(`고위험 ${rc}개사`);cond.push("산업 집중 관리");}else if(msc>=60||asc>=40){act=ACT.REDUCE_S;ar=-10;tl="단기 (3개월 내)";rat.push(`평균부실 ${asc.toFixed(0)}`);cond.push("분기 점검");}else if(ur>.88){act=ACT.FREEZE;ar=0;tl="단기 (3개월 내)";rat.push(`EAD/한도 ${(ur*100).toFixed(1)}%`);}else if(asc<22&&ur<.68){act=ACT.INCREASE;ar=12;tl="중기 (6개월 내)";rat.push(`평균부실 ${asc.toFixed(0)} 우량`);}else{act=ACT.MAINTAIN;ar=0;tl="모니터링 지속";rat.push("산업 안정");}const nl=Math.round(d.tl*(1+ar/100));return{id:iid,nm:ind.n,cl:d.tl,nl,dl:nl-d.tl,ar,e:d.te,ur,msc,asc:Math.round(asc),act,tl,rat,cond,cnt:d.sc.length};});}

      <td style="font-family:monospace;font-weight:700;color:${e>c.lim?"#dc2626":e/c.lim>.9?"#ea580c":"#1d6fdb"};">${pct(e,c.lim)}%</td>
      <td style="min-width:110px;"><div style="height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:3px;"><div style="width:${c.br}%;background:linear-gradient(90deg,#3b82f6,#1d6fdb);"></div><div style="width:${c.sr}%;background:linear-gradient(90deg,#22c55e,#15803d);"></div></div><div class="fxw" style="gap:6px;"><span style="font-size:8px;color:#1d6fdb;">매입 <b style="font-family:monospace;">${c.br}%</b></span><span style="font-size:8px;color:#15803d;">매출 <b style="font-family:monospace;">${c.sr}%</b></span></div></td>
      <td>${rec?`<span class="tag" style="background:${rec.act.c}12;color:${rec.act.c};border:1px solid ${rec.act.c}33;white-space:nowrap;">${rec.act.ic} ${rec.act.lb}</span>`:""}</td>
      <td>${rec&&rec.ar!==0?`<div style="font-size:11px;font-family:monospace;font-weight:700;color:${rec.act.cd==="SUSPEND"?"#dc2626":rec.dl<0?"#ea580c":"#15803d"};">${rec.act.cd==="SUSPEND"?"신규중단":fmt(rec.nl)}</div><div style="font-size:9px;font-family:monospace;color:${rec.ar<0?"#ea580c":"#15803d"};">${fmtP(rec.ar)}</div>`:rec?`<span style="color:#9ca3af;font-size:10px;">현행 유지</span>`:""}</td>
      <td>${all.length>0?`<div class="fx" style="gap:4px;flex-wrap:wrap;"><span style="font-size:9px;color:#0d9488;font-weight:700;">${t1}·${t2}·${t3}</span>${hs>0?`<span style="font-size:9px;padding:0 4px;border-radius:3px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-weight:700;">⚠${hs}</span>`:""}</div>`:"-"}</td>
    </tr>`;
  }).join("");
  return`<div style="background:#fff;border-radius:11px;border:1px solid #e3e7ef;overflow:hidden;"><div style="padding:11px 14px;background:#f7f8fb;border-bottom:1px solid #e3e7ef;font-size:11px;font-weight:700;color:#374151;">개별기업 익스포져 현황 <span style="font-size:9px;color:#9ca3af;font-weight:400;">· 기업명 클릭 → 계좌 상세</span></div>
  <div class="ox"><table><thead><tr>${["기업명","계열","산업","등급","한도금액","승인금액","잔  액","EAD","소진율","EAD/한도","매입/매출","건의 액션","건의 한도","하청(1·2·3차)"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

/* ===== RENDER & STATE ===== */
function render(){
  const tl=CO.reduce((s,c)=>s+c.lim,0),te=CO.reduce((s,c)=>s+ead(c),0),oc=CO.filter(c=>ead(c)>c.lim).length,uc=CO.filter(c=>dscore(c)>=70).length;
  const na=CR.filter(r=>r.act.pr>=3).length,tse=SUB.reduce((s,x)=>s+x.bx,0),hsc=SUB.filter(s=>srisk(s)>=45).length;
  document.getElementById("krow").innerHTML=[{lb:"CP 총 한도",v:fmt(tl),c:"#475569"},{lb:"포트폴리오 EAD",v:fmt(te),c:"#1d6fdb"},{lb:"즉시 조치 건의",v:`${na}건`,c:"#dc2626",w:na>0},{lb:"경계단계 여신",v:`${uc}개사`,c:"#dc2626",w:uc>0},{lb:"EAD 한도초과",v:`${oc}개사`,c:"#ea580c",w:oc>0},{lb:"하청 총 익스포져",v:fmt(tse),c:"#0d9488"},{lb:"하청 고위험",v:`${hsc}개사`,c:hsc>0?"#ea580c":"#15803d",w:hsc>0}].map(k=>`<div class="kc" style="${k.w?"background:#fef2f2;border-color:#fecaca;":""}"><div class="kl">${k.lb}</div><div class="kv" style="color:${k.c}">${k.v}</div></div>`).join("");
  const bu=document.getElementById("badgeU");bu.innerHTML=na>0?`<span style="font-size:9px;padding:1px 5px;border-radius:10px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-weight:700;">${na}</span>`:"";
  document.getElementById("pane-rec").innerHTML=buildRec();
  if(!document.getElementById("pane-wf").classList.contains("hidden"))document.getElementById("pane-wf").innerHTML=buildWF();
  if(!document.getElementById("pane-net").classList.contains("hidden")){document.getElementById("pane-net").innerHTML=buildNetTab();if(ST.nsel){if(ST.nanim)cancelAnimationFrame(ST.nanim);setTimeout(()=>{ST.nanim=startAnim("nc2","nt2","ns2",ST.nsel);},80);}}
  if(!document.getElementById("pane-exp").classList.contains("hidden"))document.getElementById("pane-exp").innerHTML=buildExp();
  if(ST.editing){const inp=document.getElementById("ei-"+ST.editing);if(inp){inp.value=ST.ev;inp.focus();}}
  if(!document.getElementById("pane-wf").classList.contains("hidden")&&ST.stage===3&&ST.sel)
    setTimeout(()=>{if(ST.nanim)cancelAnimationFrame(ST.nanim);ST.nanim=startAnim("nc1","nt1","ns1",(ST.sel&&ST.sel.id));},80);
}

/* ===== EVENT HANDLERS ===== */
function swTab(id){
  ST.tab=id;if(ST.nanim){cancelAnimationFrame(ST.nanim);ST.nanim=null;}
  document.querySelectorAll(".tb").forEach(b=>{b.classList.remove("active");b.style.borderBottom="2px solid transparent";});
  const btn=document.getElementById("tb-"+id);btn.classList.add("active");
  btn.style.borderBottom=`2.5px solid ${{rec:"#1d6fdb",wf:"#dc2626",net:"#7c3aed",exp:"#475569"}[id]}`;
  ["rec","wf","net","exp"].forEach(t=>{const p=document.getElementById("pane-"+t);if(!p)return;p.classList.toggle("hidden",t!==id);
    if(t===id){p.classList.add("fade-in");if(t==="wf")p.innerHTML=buildWF();if(t==="net"){p.innerHTML=buildNetTab();if(ST.nsel)setTimeout(()=>{ST.nanim=startAnim("nc2","nt2","ns2",ST.nsel);},80);}if(t==="exp")p.innerHTML=buildExp();}
  });
  if(id==="wf"&&ST.stage===3&&ST.sel)setTimeout(()=>{ST.nanim=startAnim("nc1","nt1","ns1",(ST.sel&&ST.sel.id));},80);
}
function setNsel(id){ST.nsel=id;if(ST.nanim){cancelAnimationFrame(ST.nanim);ST.nanim=null;}render();setTimeout(()=>{if(ST.nsel)ST.nanim=startAnim("nc2","nt2","ns2",ST.nsel);},80);}
function setRV(v){ST.rv=v;ST.rf="ALL";render();}function setRF(f){ST.rf=f;render();}function setRS(s){ST.rs=s;render();}
function togAcc(id){ST.acc.has(id)?ST.acc.delete(id):ST.acc.add(id);render();}
function startEdit(id,val){ST.editing=id;ST.ev=String(val);render();}
function saveEdit(id){const v=parseInt(ST.ev.replace(/[^\d]/g,""),10);if(!isNaN(v)&&v>0)ST.mod[id]=v;ST.editing=null;ST.ev="";render();}
function cancelEdit(){ST.editing=null;ST.ev="";render();}
function selCo(id,event){if(event&&event.target.closest('button'))return;const c=CO.find(x=>x.id===id);if((ST.sel&&ST.sel.id)===id){ST.sel=null;}else{ST.sel={...c,e:ead(c)};if(dscore(c)>=25)ST.stage=2;}render();}
function clearSel(){ST.sel=null;ST.stage=1;if(ST.nanim){cancelAnimationFrame(ST.nanim);ST.nanim=null;}render();}
function setStage(n){if(n===1||ST.sel){if(ST.nanim){cancelAnimationFrame(ST.nanim);ST.nanim=null;}ST.stage=n;render();if(n===3&&ST.sel)setTimeout(()=>{ST.nanim=startAnim("nc1","nt1","ns1",(ST.sel&&ST.sel.id));},80);}}
/* ===== 이벤트 위임: data-action 처리 ===== */
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  e.preventDefault();
  e.stopImmediatePropagation();
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if(action === 'modal'){ if(id) openModal(id); }
  else if(action === 'accept'){ togAcc(id); }
  else if(action === 'cancel-accept'){ togAcc(id); }
  else if(action === 'edit'){
    const fl = parseInt(btn.dataset.fl, 10);
    startEdit(id, fl);
  }
  else if(action === 'save'){ saveEdit(id); }
  else if(action === 'cancel'){ cancelEdit(); }
});

try {
  render();
} catch(err) {
  document.body.innerHTML = '<div style="padding:20px;font-family:monospace;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;margin:20px;border-radius:8px;">'
    + '<b>JS 오류:</b><br>' + err.toString() + '<br><br>' + (err.stack||'') + '</div>';
}
</script>
